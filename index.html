<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nachschreibe-Manager</title>
    <!-- Tailwind CSS: Ein Framework für schnelles Styling direkt über Klassen -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons: Eine Bibliothek für die Symbole (Icons) in der App -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- jsPDF & AutoTable: Bibliotheken, um aus Tabellendaten ein PDF-Dokument zu erzeugen -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-sans">

    <!-- SEKTION: LOGIN-BILDSCHIRM -->
    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-100 text-center">
            <div class="inline-flex p-4 bg-blue-50 rounded-full mb-6 text-blue-600">
                <i data-lucide="lock" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-900 mb-2">Zugang geschützt</h2>
            <p class="text-slate-500 mb-6 text-sm">Bitte gib das Passwort ein, um den Nachschreibe-Manager zu nutzen.</p>
            
            <form id="loginForm" class="space-y-4">
                <input type="password" id="passwordInput" required 
                       class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none text-center text-lg" 
                       placeholder="Passwort eingeben">
                <p id="loginError" class="text-red-500 text-sm hidden">Falsches Passwort!</p>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all">
                    Anmelden
                </button>
            </form>
        </div>
    </div>

    <!-- SEKTION: HAUPTANWENDUNG (Standardmäßig versteckt) -->
    <div id="appContainer" class="p-4 md:p-8 hidden">
        <div class="max-w-6xl mx-auto space-y-8">
            
            <!-- SEKTION: HEADER (Titel und globale Aktionen wie PDF, Backup, Laden) -->
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div>
                    <h1 class="text-3xl font-bold text-slate-900 flex items-center gap-3">
                        <i data-lucide="book-open" class="text-blue-600 h-8 w-8"></i>
                        Nachschreibe-Manager
                    </h1>
                    <p class="text-slate-500 mt-2">Behalte den Überblick über alle fehlenden Klassenarbeiten.</p>
                </div>
                
                <!-- Schaltflächen für Datenexport und Import -->
                <div class="flex flex-col items-end gap-3 mt-4 md:mt-0 text-sm">
                    <div class="flex flex-wrap justify-end gap-2">
                        <!-- PDF Export Button -->
                        <button onclick="exportPDF()" title="Aktuelle Ansicht als PDF speichern" class="bg-red-50 border border-red-100 text-red-700 hover:bg-red-100 px-3 py-2 rounded-lg flex items-center gap-2 font-medium transition-colors shadow-sm">
                            <i data-lucide="file-text" class="w-4 h-4"></i> PDF Übersicht
                        </button>
                        <!-- Standard Backup (Downloads Ordner) -->
                        <button onclick="exportData()" title="In Standard-Download-Ordner speichern" class="bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 px-3 py-2 rounded-lg flex items-center gap-2 font-medium transition-colors shadow-sm">
                            <i data-lucide="download" class="w-4 h-4"></i> Backup (Downloads)
                        </button>
                        <!-- Speichern unter (Freie Wahl des Speicherorts) -->
                        <button id="btnSaveAs" onclick="saveAsData()" title="Speicherort manuell wählen" class="bg-blue-50 border border-blue-100 text-blue-700 hover:bg-blue-100 px-3 py-2 rounded-lg flex items-center gap-2 font-medium transition-colors shadow-sm">
                            <i data-lucide="save" class="w-4 h-4"></i> Speichern unter...
                        </button>
                        <!-- Laden Button (Verstecktes File-Input) -->
                        <label class="bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 px-3 py-2 rounded-lg flex items-center gap-2 font-medium transition-colors shadow-sm cursor-pointer">
                            <i data-lucide="upload" class="w-4 h-4"></i> Laden
                            <input type="file" id="fileInput" accept=".json" class="hidden" onchange="importData(event)">
                        </label>
                        <!-- Logout Button -->
                        <button onclick="logout()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-2 rounded-lg flex items-center gap-2 font-medium transition-colors shadow-sm">
                            <i data-lucide="log-out" class="w-4 h-4"></i> Logout
                        </button>
                    </div>
                    
                    <!-- Statistische Kurzinfos (Ausstehend, Fehlende AU) -->
                    <div class="flex gap-2">
                        <div class="bg-blue-50 text-blue-700 px-4 py-2 rounded-lg flex items-center gap-2 font-medium">
                            <i data-lucide="alert-circle" class="w-4 h-4"></i>
                            <span id="statsPending">0</span> Ausstehend
                        </div>
                        <div id="statsMissingAuContainer" class="bg-amber-50 text-amber-700 px-4 py-2 rounded-lg flex items-center gap-2 font-medium hidden">
                            <i data-lucide="file-heart" class="w-4 h-4"></i>
                            <span id="statsMissingAu">0</span> Ohne AU
                        </div>
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- SEKTION: FORMULAR (Links - Zum Hinzufügen oder Bearbeiten von Einträgen) -->
                <div class="lg:col-span-1 space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <h2 id="formTitle" class="text-xl font-semibold mb-4 text-slate-800 border-b pb-3">Neuen Termin anlegen</h2>
                        
                        <form id="addForm" class="space-y-4">
                            <!-- Input für den Namen -->
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-2">
                                    <i data-lucide="user" class="w-4 h-4"></i> Name des Schülers
                                </label>
                                <input type="text" id="inputName" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="z.B. Anna Schmidt">
                            </div>

                            <!-- Input für die Klasse -->
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-2">
                                    <i data-lucide="users" class="w-4 h-4"></i> Klasse
                                </label>
                                <input type="text" id="inputClass" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="z.B. 10a, Q1">
                            </div>

                            <!-- Input für E-Mail -->
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-2">
                                    <i data-lucide="mail" class="w-4 h-4"></i> E-Mail Adresse
                                </label>
                                <input type="email" id="inputEmail" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="schueler@email.de">
                            </div>

                            <!-- Input für die Klausur -->
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-2">
                                    <i data-lucide="book-open" class="w-4 h-4"></i> Verpasste Klassenarbeit
                                </label>
                                <input type="text" id="inputExam" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="z.B. Englisch Vokabeltest">
                            </div>

                            <!-- Input für den Termin -->
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-2">
                                    <i data-lucide="calendar" class="w-4 h-4"></i> Nachschreibetermin
                                </label>
                                <input type="datetime-local" id="inputDate" required class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>

                            <!-- Checkbox für AU -->
                            <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-lg border border-slate-200">
                                <input type="checkbox" id="inputAU" class="w-5 h-5 rounded text-blue-600 focus:ring-blue-500 cursor-pointer">
                                <label for="inputAU" class="text-sm font-medium text-slate-700 cursor-pointer flex items-center gap-2">
                                    <i data-lucide="file-heart" class="w-4 h-4 text-emerald-600"></i>
                                    AU (Attest) liegt bereits vor
                                </label>
                            </div>

                            <!-- Buttons für Submit und Abbrechen (Bearbeitungsmodus) -->
                            <div class="flex gap-2 mt-4">
                                <button type="submit" id="submitBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors shadow-sm">
                                    Eintrag hinzufügen
                                </button>
                                <button type="button" id="cancelEditBtn" onclick="cancelEdit()" class="hidden bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium px-4 py-2.5 rounded-lg transition-colors shadow-sm">
                                    Abbrechen
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- SEKTION: LISTENANSICHT (Rechts - Filter, Sortierung und Schüler-Karten) -->
                <div class="lg:col-span-2 space-y-6">
                    
                    <!-- Toolbar: Filterung und Sortierung -->
                    <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <!-- Status-Filter (Tabs) -->
                        <div class="flex gap-2 overflow-x-auto w-full sm:w-auto">
                            <button onclick="setFilter('all')" id="btnFilterAll" class="px-4 py-2 rounded-lg text-sm font-medium transition-colors whitespace-nowrap bg-slate-800 text-white">
                                Alle (<span id="countAll">0</span>)
                            </button>
                            <button onclick="setFilter('pending')" id="btnFilterPending" class="px-4 py-2 rounded-lg text-sm font-medium transition-colors whitespace-nowrap hover:bg-blue-50 text-blue-700">
                                Ausstehend (<span id="countPending">0</span>)
                            </button>
                            <button onclick="setFilter('completed')" id="btnFilterCompleted" class="px-4 py-2 rounded-lg text-sm font-medium transition-colors whitespace-nowrap hover:bg-emerald-50 text-emerald-700">
                                Erledigt (<span id="countCompleted">0</span>)
                            </button>
                        </div>

                        <!-- Dropdown für die Sortierung -->
                        <div class="flex items-center gap-2 w-full sm:w-auto text-sm">
                            <label for="sortSelect" class="text-slate-500 font-medium flex items-center gap-1.5 whitespace-nowrap">
                                <i data-lucide="arrow-up-down" class="w-4 h-4"></i> Sortieren:
                            </label>
                            <select id="sortSelect" onchange="setSort(this.value)" class="bg-slate-50 border border-slate-200 text-slate-700 rounded-lg px-3 py-1.5 focus:ring-2 focus:ring-blue-500 outline-none w-full sm:w-auto cursor-pointer">
                                <option value="date">Nach Termin (frühste zuerst)</option>
                                <option value="class">Nach Klasse (A-Z)</option>
                                <option value="exam">Nach Klausur (A-Z)</option>
                            </select>
                        </div>
                    </div>

                    <!-- Raster für die Schüler-Karten -->
                    <div id="recordsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Die Karten werden dynamisch via JavaScript hier eingefügt -->
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- LOGIK: JAVASCRIPT -->
    <script>
        /**
         * SICHERHEITSEINSTELLUNGEN
         * Ändere hier das Passwort für den Zugang.
         */
        const APP_PASSWORD = "!TeamKIT!"; // Standardpasswort (bitte ändern)

        /**
         * GLOBALER ZUSTAND (State)
         * Hier liegen alle Daten der App während sie läuft.
         */
        let records = [];
        let isLoggedIn = false;
        
        // Auto-Load: Daten aus dem Browserspeicher (LocalStorage) beim Start laden
        const savedData = localStorage.getItem('nachschreibeRecords');
        if (savedData) {
            try {
                records = JSON.parse(savedData);
            } catch (e) {
                console.error("Fehler beim Laden der lokalen Daten", e);
                records = [];
            }
        }
        
        let currentFilter = 'all'; // 'all', 'pending', 'completed'
        let currentSort = 'date';  // 'date', 'class', 'exam'
        let editingId = null;      // Speichert die ID des Eintrags, der gerade bearbeitet wird

        /**
         * FUNKTION: Login verarbeiten
         */
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const input = document.getElementById('passwordInput').value;
            const error = document.getElementById('loginError');

            if (input === APP_PASSWORD) {
                isLoggedIn = true;
                error.classList.add('hidden');
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContainer').classList.remove('hidden');
                render();
            } else {
                error.classList.remove('hidden');
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        });

        /**
         * FUNKTION: Logout
         */
        window.logout = function() {
            isLoggedIn = false;
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('appContainer').classList.add('hidden');
            document.getElementById('loginError').classList.add('hidden');
        };

        /**
         * FUNKTION: Sortierung ändern
         */
        function setSort(sortValue) {
            currentSort = sortValue;
            render();
        }

        /**
         * FUNKTION: Filter ändern und UI-Buttons anpassen
         */
        function setFilter(filter) {
            currentFilter = filter;
            
            const btnAll = document.getElementById('btnFilterAll');
            const btnPending = document.getElementById('btnFilterPending');
            const btnCompleted = document.getElementById('btnFilterCompleted');
            
            // CSS Klassen für alle Buttons zurücksetzen
            [btnAll, btnPending, btnCompleted].forEach(btn => {
                btn.className = "px-4 py-2 rounded-lg text-sm font-medium transition-colors whitespace-nowrap";
            });

            // Aktiven Button hervorheben
            if(filter === 'all') btnAll.classList.add('bg-slate-800', 'text-white');
            else btnAll.classList.add('hover:bg-slate-100', 'text-slate-600');

            if(filter === 'pending') btnPending.classList.add('bg-blue-600', 'text-white');
            else btnPending.classList.add('hover:bg-blue-50', 'text-blue-700');

            if(filter === 'completed') btnCompleted.classList.add('bg-emerald-600', 'text-white');
            else btnCompleted.classList.add('hover:bg-emerald-50', 'text-emerald-700');

            render();
        }

        /**
         * FUNKTION: Statistiken (Oben rechts im Header) aktualisieren
         */
        function updateStats() {
            const totalPending = records.filter(r => r.status === 'pending').length;
            const totalMissingAU = records.filter(r => r.status === 'pending' && !r.hasAU).length;
            const totalCompleted = records.length - totalPending;

            document.getElementById('statsPending').innerText = totalPending;
            document.getElementById('countAll').innerText = records.length;
            document.getElementById('countPending').innerText = totalPending;
            document.getElementById('countCompleted').innerText = totalCompleted;

            // Warnung nur zeigen, wenn wirklich jemand ein Attest nachreichen muss
            const auContainer = document.getElementById('statsMissingAuContainer');
            if (totalMissingAU > 0) {
                auContainer.classList.remove('hidden');
                document.getElementById('statsMissingAu').innerText = totalMissingAU;
            } else {
                auContainer.classList.add('hidden');
            }
        }

        /**
         * FUNKTION: Verarbeitet die Liste (Filtern und Sortieren) für die Anzeige
         */
        function getProcessedRecords() {
            let filtered = records.filter(record => {
                if (currentFilter === 'all') return true;
                return record.status === currentFilter;
            });

            filtered.sort((a, b) => {
                if (currentSort === 'class') {
                    return a.schoolClass.localeCompare(b.schoolClass);
                } else if (currentSort === 'exam') {
                    return a.examName.localeCompare(b.examName);
                } else {
                    return new Date(a.makeUpDate) - new Date(b.makeUpDate);
                }
            });
            return filtered;
        }

        /**
         * KERN-FUNKTION: RENDER (Zeichnet die gesamte Oberfläche neu)
         * Diese Funktion wird bei fast jeder Benutzerinteraktion aufgerufen.
         */
        function render() {
            if (!isLoggedIn) return; // Sicherheitssperre im JS

            // 1. Auto-Save: Daten im Browserspeicher sichern
            localStorage.setItem('nachschreibeRecords', JSON.stringify(records));

            const grid = document.getElementById('recordsGrid');
            grid.innerHTML = '';

            const filteredRecords = getProcessedRecords();

            // 2. Leere Ansicht handhaben
            if (filteredRecords.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full bg-white p-12 rounded-2xl shadow-sm border border-slate-100 text-center text-slate-500">
                        <i data-lucide="book-open" class="w-12 h-12 mx-auto text-slate-300 mb-4"></i>
                        <p class="text-lg">Keine Einträge gefunden.</p>
                    </div>
                `;
            } else {
                // 3. Karten für jeden Schüler generieren
                filteredRecords.forEach(record => {
                    const dateObj = new Date(record.makeUpDate);
                    const isPast = dateObj < new Date() && record.status === 'pending';
                    
                    const borderClass = record.status === 'completed' 
                        ? 'border-emerald-100 opacity-80' 
                        : isPast ? 'border-red-200' : 'border-slate-100';

                    const card = document.createElement('div');
                    card.className = `bg-white rounded-2xl shadow-sm border-2 transition-all ${borderClass}`;
                    
                    card.innerHTML = `
                        <div class="p-5">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="text-lg font-bold ${record.status === 'completed' ? 'text-slate-500 line-through' : 'text-slate-900'}">${record.name}</h3>
                                    <span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-medium mt-1 ${record.status === 'completed' ? 'bg-emerald-100 text-emerald-800' : 'bg-blue-100 text-blue-800'}">
                                        ${record.status === 'completed' ? 'Nachgeschrieben' : 'Ausstehend'}
                                    </span>
                                </div>
                                <button onclick="toggleAU('${record.id}')" class="p-1.5 rounded-lg border flex items-center gap-1.5 ${record.hasAU ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-red-50 text-red-700 border-red-200'}">
                                    <i data-lucide="file-heart" class="w-4 h-4"></i>
                                    <span class="text-xs font-bold">${record.hasAU ? 'AU ✔' : 'AU ✘'}</span>
                                </button>
                            </div>

                            <div class="space-y-2 mb-6 text-sm">
                                <div class="flex gap-2 text-slate-700"><i data-lucide="users" class="w-4 h-4 opacity-50"></i> <span><b>Klasse:</b> ${record.schoolClass}</span></div>
                                <div class="flex gap-2 text-slate-700"><i data-lucide="book-open" class="w-4 h-4 opacity-50"></i> <span><b>Klausur:</b> ${record.examName}</span></div>
                                <div class="flex gap-2 ${isPast ? 'text-red-600' : 'text-slate-700'}"><i data-lucide="calendar" class="w-4 h-4 opacity-50"></i> <span><b>Termin:</b> ${dateObj.toLocaleDateString('de-DE')} um ${dateObj.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'})}</span></div>
                                
                                <div class="pt-2">
                                    <button onclick="toggleInvitationSent('${record.id}')" class="flex items-center gap-2 p-1.5 rounded-md hover:bg-slate-50 w-full text-left transition-colors ${record.invitationSentDate ? 'text-emerald-700' : 'text-slate-500'}">
                                        <i data-lucide="${record.invitationSentDate ? 'check-square' : 'square'}" class="w-4 h-4"></i>
                                        <span>Einladung: ${record.invitationSentDate ? 'Verschickt am ' + new Date(record.invitationSentDate).toLocaleDateString('de-DE') : 'Noch offen'}</span>
                                    </button>
                                    <button onclick="toggleListed('${record.id}')" class="flex items-center gap-2 p-1.5 rounded-md hover:bg-slate-50 w-full text-left transition-colors ${record.isListed ? 'text-purple-700' : 'text-slate-500'}">
                                        <i data-lucide="${record.isListed ? 'check-square' : 'square'}" class="w-4 h-4"></i>
                                        <span>In Liste vermerkt</span>
                                    </button>
                                </div>
                            </div>

                            <div class="flex items-center gap-2 pt-4 border-t border-slate-100">
                                <button onclick="toggleStatus('${record.id}')" class="flex-1 px-3 py-2 rounded-lg text-sm font-medium ${record.status === 'completed' ? 'bg-slate-100' : 'bg-emerald-50 text-emerald-700'} hover:opacity-80">
                                    ${record.status === 'completed' ? 'Wieder öffnen' : 'Erledigt'}
                                </button>
                                <button onclick="sendEmail('${record.id}')" ${!record.email ? 'disabled' : ''} class="p-2 rounded-lg bg-blue-50 text-blue-600 disabled:opacity-30"><i data-lucide="mail" class="w-5 h-5"></i></button>
                                <button onclick="editRecord('${record.id}')" class="p-2 rounded-lg bg-amber-50 text-amber-600"><i data-lucide="pencil" class="w-5 h-5"></i></button>
                                <button onclick="deleteRecord('${record.id}')" class="p-2 rounded-lg bg-red-50 text-red-600"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            // UI Refresh für Icons und Statistiken
            updateStats();
            lucide.createIcons();
        }

        /**
         * FUNKTION: Bearbeiten-Modus starten
         */
        window.editRecord = function(id) {
            const record = records.find(r => r.id === id);
            if (!record) return;
            editingId = id;
            document.getElementById('inputName').value = record.name;
            document.getElementById('inputClass').value = record.schoolClass;
            document.getElementById('inputEmail').value = record.email || '';
            document.getElementById('inputExam').value = record.examName;
            document.getElementById('inputDate').value = record.makeUpDate;
            document.getElementById('inputAU').checked = record.hasAU;
            
            document.getElementById('formTitle').innerText = 'Termin bearbeiten';
            document.getElementById('submitBtn').innerText = 'Änderungen speichern';
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            document.getElementById('addForm').scrollIntoView({ behavior: 'smooth', block: 'center' });
        };

        window.cancelEdit = function() {
            editingId = null;
            document.getElementById('addForm').reset();
            document.getElementById('formTitle').innerText = 'Neuen Termin anlegen';
            document.getElementById('submitBtn').innerText = 'Eintrag hinzufügen';
            document.getElementById('cancelEditBtn').classList.add('hidden');
        };

        /**
         * EVENT: Formular Absenden
         */
        document.getElementById('addForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const recordData = {
                name: document.getElementById('inputName').value,
                schoolClass: document.getElementById('inputClass').value,
                email: document.getElementById('inputEmail').value,
                examName: document.getElementById('inputExam').value,
                makeUpDate: document.getElementById('inputDate').value,
                hasAU: document.getElementById('inputAU').checked,
            };

            if (editingId) {
                records = records.map(r => r.id === editingId ? { ...r, ...recordData } : r);
            } else {
                records.unshift({
                    ...recordData,
                    id: crypto.randomUUID(),
                    status: 'pending',
                    invitationSentDate: null,
                    isListed: false
                });
            }
            cancelEdit(); 
            render();
        });

        /**
         * HELFER-FUNKTIONEN: Statusänderungen
         */
        window.toggleStatus = id => { records = records.map(r => r.id === id ? { ...r, status: r.status === 'pending' ? 'completed' : 'pending' } : r); render(); };
        window.toggleAU = id => { records = records.map(r => r.id === id ? { ...r, hasAU: !r.hasAU } : r); render(); };
        window.toggleInvitationSent = id => { records = records.map(r => r.id === id ? { ...r, invitationSentDate: r.invitationSentDate ? null : new Date().toISOString() } : r); render(); };
        window.toggleListed = id => { records = records.map(r => r.id === id ? { ...r, isListed: !r.isListed } : r); render(); };

        window.deleteRecord = function(id) {
            if (confirm('Möchtest du diesen Eintrag wirklich löschen?')) {
                records = records.filter(r => r.id !== id);
                render();
            }
        };

        /**
         * FUNKTION: E-Mail Client öffnen
         */
        window.sendEmail = function(id) {
            const r = records.find(rec => rec.id === id);
            if (!r || !r.email) return;
            const d = new Date(r.makeUpDate);
            const subject = encodeURIComponent(`Einladung Nachschreibetermin: ${r.examName}`);
            const body = encodeURIComponent(`Hallo ${r.name},\n\ndein Nachschreibetermin für "${r.examName}" ist am ${d.toLocaleDateString('de-DE')} um ${d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'})} Uhr.\n\n${r.hasAU ? 'Attest liegt vor.' : 'Bitte Attest noch einreichen!'}`);
            window.location.href = `mailto:${r.email}?subject=${subject}&body=${body}`;
        };

        /**
         * SPEICHER-FUNKTIONEN
         */
        window.exportData = function() {
            const blob = new Blob([JSON.stringify(records, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `nachschreiber_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };

        window.saveAsData = async function() {
            if (!('showSaveFilePicker' in window)) return alert("Nicht unterstützt.");
            try {
                const h = await window.showSaveFilePicker({ suggestedName: `nachschreiber.json`, types: [{ description: 'JSON', accept: {'application/json': ['.json']} }] });
                const w = await h.createWritable();
                await w.write(JSON.stringify(records, null, 2));
                await w.close();
                alert("Gespeichert!");
            } catch (err) {}
        };

        window.importData = function(e) {
            const f = e.target.files[0];
            if (!f) return;
            const r = new FileReader();
            r.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (Array.isArray(data)) { records = data; render(); alert("Daten geladen!"); }
                } catch (err) { alert("Ungültige Datei."); }
                e.target.value = '';
            };
            r.readAsText(f);
        };

        /**
         * PDF GENERIERUNG
         */
        window.exportPDF = function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const list = getProcessedRecords();
            if(!list.length) return alert("Keine Daten.");

            doc.setFontSize(18);
            doc.text("Nachschreibe-Übersicht", 14, 20);
            doc.setFontSize(10);
            doc.text(`Stand: ${new Date().toLocaleDateString('de-DE')}`, 14, 28);

            const rows = list.map(r => {
                const d = new Date(r.makeUpDate);
                return [r.name, r.schoolClass, r.examName, d.toLocaleDateString('de-DE') + " " + d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}), r.hasAU ? "Ja" : "Nein", r.status === 'completed' ? "Erledigt" : "Offen"];
            });

            doc.autoTable({
                startY: 35,
                head: [['Name', 'Klasse', 'Klausur', 'Termin', 'AU', 'Status']],
                body: rows,
                headStyles: { fillColor: [37, 99, 235] }
            });

            doc.save(`nachschreiber_übersicht.pdf`);
        };

        // Startpunkt der App
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons(); // Initial Icons für Login Screen
            if (!('showSaveFilePicker' in window)) document.getElementById('btnSaveAs').classList.add('opacity-30', 'pointer-events-none');
        });
    </script>
</body>
</html>
